services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    networks:
      - chat-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # ✅ 移除 ./data/milvus:/data/milvus，避免與 server 混用 Lite/檔鎖
      - ./data/laborlaw:/data/laborlaw
      - ./backend:/app
    environment:
      MONGODB_URL: "mongodb://mongo:27017/chatdb"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "password123"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "gemma3n:e2b"
      INPUT_DIR: "/data/laborlaw/inputs"
      PROCESSED_DIR: "/data/laborlaw/processed"
      OUTPUT_JSON_DIR: "/data/laborlaw/output/json"

      # ✅ 明確指定用「Server」模式連線 Milvus（兩種方式都給，程式不必改）
      MILVUS_MODE: "server"
      MILVUS_HOST: "milvus"
      MILVUS_PORT: "19530"

      # 可留著但不會使用（避免誤觸 Lite）
      MILVUS_DB_PATH: "/data/milvus/milvus_lite.db"
      PYTHONPATH: "/app"
    depends_on:
      mongo:
        condition: service_started
      ollama:
        condition: service_started
      neo4j:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - chat-network

  milvus:
    image: milvusdb/milvus:v2.4.10
    # 如 Mac M 芯片遇到相容問題，可打開：
    platform: linux/amd64
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped
    environment:
      # ✅ 改用外部 MinIO
      ETCD_USE_EMBED: "true"
      MINIO_USE_EMBED: "false"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "milvus-bucket"   # Milvus 會自建
      MIGRATION: "true"
      LOG_LEVEL: "debug"
      TZ: "Asia/Taipei"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./data/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    shm_size: 1g
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9091/healthz || curl -sf http://localhost:19530/api/v1/healthy"]
      interval: 5s
      timeout: 5s
      retries: 60
    networks:
      - chat-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 60
    networks:
      - chat-network


  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: "chatdb"
    networks:
      - chat-network

  neo4j:
    image: neo4j:5.20
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: "neo4j/password123"
      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_bolt_listen__address: ":7687"
      NEO4J_server_bolt_advertised__address: "neo4j:7687"
      NEO4J_server_http_listen__address: ":7474"
      NEO4J_server_http_advertised__address: "neo4j:7474"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p password123 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - chat-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_TIMEOUT: "600"
    networks:
      - chat-network
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "ollama serve &
       SERVER_PID=$!
       echo 'Waiting for Ollama server to start...'
       sleep 10
       echo 'Pulling gemma3n:e2b model...'
       ollama pull gemma3n:e2b || echo 'Failed to pull model, will retry later'
       echo 'Ollama setup complete'
       wait $SERVER_PID"

volumes:
  mongo_data:
  neo4j_data:
  ollama_data:
  minio_data:

networks:
  chat-network:
    driver: bridge

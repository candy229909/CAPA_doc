services:
  # 前端 React 應用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - chat-network

  # 後端 FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MONGODB_URL=mongodb://mongo:27017/chatdb
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONPATH=/app
    depends_on:
      - mongo
      - neo4j
      - ollama
    networks:
      - chat-network

  # MongoDB 對話歷史儲存
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=chatdb
    networks:
      - chat-network

  # Neo4j 圖形資料庫 (用於知識圖譜/關係分析)
  neo4j:
    image: neo4j:5.15
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - chat-network

  # Ollama 語言模型服務
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_TIMEOUT=300
    networks:
      - chat-network
    restart: unless-stopped
    # 保持服務運行
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "ollama serve &
       SERVER_PID=$!
       echo 'Waiting for Ollama server to start...'
       sleep 10
       echo 'Pulling gemma3n:e2b model...'
       ollama pull gemma3n:e2b || echo 'Failed to pull model, will retry later'
       echo 'Ollama setup complete'
       wait $SERVER_PID"

volumes:
  mongo_data:
  neo4j_data:
  ollama_data:

networks:
  chat-network:
    driver: bridge